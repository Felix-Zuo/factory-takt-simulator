name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Build, lint, audit, smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependency surface
        run: npm audit --omit=dev

      - name: Industrial gateway tests
        run: npm run test:gateway

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Maintainability check
        run: npm run maintain:check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        run: |
          npm run start:local > /tmp/factory-takt-vite.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:5173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/factory-takt-vite.log
          exit 1

      - name: Smoke test
        env:
          FACTORY_TAKT_URL: http://127.0.0.1:5173
        run: npm run test:smoke
