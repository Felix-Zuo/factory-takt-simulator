name: Feature request
description: Propose a product or technical improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow, modeling gap, or user decision would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Canvas and interaction
        - Simulation correctness
        - Takt calculation
        - Scenario import/export
        - Report generation
        - Desktop packaging
        - Documentation
        - GitHub/project operations
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - ...
        - ...
  - type: checkboxes
    id: privacy
    attributes:
      label: Public-data boundary
      options:
        - label: This proposal can be described with generic Process A/B/C examples.
          required: true
